<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ready to Sell — Home Project</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260706c" />
</head>
<body>

<!-- Read-only banner (shown when viewing a shared link) -->
<div id="readOnlyBanner" class="readonly-banner">
  👀 You are viewing a shared read-only project. Sign in to create your own.
</div>

<nav class="nav">
  <div class="nav-inner">
    <a class="brand" href="#">
      <span class="brand-icon">🏠</span>
      <div class="brand-text">Ready to Sell<small>Home Project Tracker</small></div>
    </a>

    <div class="tab-nav">
      <button class="tab-btn active" data-tab="tasks"    onclick="switchTab('tasks')">✅ Tasks</button>
      <button class="tab-btn"        data-tab="calendar" onclick="switchTab('calendar')">📅 Calendar</button>
      <button class="tab-btn"        data-tab="summary"  onclick="switchTab('summary')">💰 Cost Summary</button>
    </div>

    <div class="nav-mode-toggle" id="navModeToggle">
      <button class="nav-mode-btn active" data-mode="diy" onclick="setMode('diy')">🔨 DIY</button>
      <button class="nav-mode-btn" data-mode="pro" onclick="setMode('pro')">👷 Pro</button>
    </div>

    <div class="auth-area">
      <button id="shareBtn" class="share-btn" title="Copy share link for view-only access">
        🔗 Share
      </button>
      <button id="authSignIn" class="btn-auth-signin" title="Sign in with Google">
        <svg width="16" height="16" viewBox="0 0 18 18" aria-hidden="true">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Sign in
      </button>
      <div id="authUserChip" class="auth-user-chip" style="display:none">
        <img id="authUserAvatar" class="auth-avatar" src="" alt="" />
        <span id="authUserName" class="auth-user-name"></span>
        <button id="authSignOut" class="auth-action-btn" title="Sign out">✕</button>
      </div>
    </div>
  </div>
</nav>

<main class="main">
  <div id="pane-tasks"    class="tab-pane active"></div>
  <div id="pane-calendar" class="tab-pane"></div>
  <div id="pane-summary"  class="tab-pane"></div>
</main>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js?v=20260706b"></script>
<script src="app.js?v=20260706b"></script>
</body>
</html>
